<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Proctoring System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --border: #e0e0e0; --border-focus: #000000; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; -webkit-font-smoothing: antialiased; }
        .login-container { width: 100%; max-width: 420px; padding: 40px; border: 1px solid var(--text); background: var(--bg); }
        .brand { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; color: #666; font-weight: 600; display: block; }
        h2 { font-size: 28px; font-weight: 700; margin: 0 0 30px 0; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 24px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 14px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 0; font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: var(--border-focus); }
        button { width: 100%; padding: 16px; background-color: var(--text); color: var(--bg); border: 1px solid var(--text); border-radius: 0; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s ease; }
        button:hover { background-color: var(--bg); color: var(--text); }
    </style>
</head>
<body>
    <div class="login-container">
        <span class="brand">System Portal</span>
        <h2>Admin Login</h2>
        <form id="admin-login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Access Dashboard</button>
        </form>
    </div>
    <script src="../shared/js/auth.js"></script>
</body>
</html>
